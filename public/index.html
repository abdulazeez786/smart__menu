<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Menu - Details</title>
    <style>
        body, html {
            height: 100%;
            margin: 0;
            font-family: Arial, sans-serif;
        }

        .bc {
            background-image: url("http://www.taher.com/wp-content/uploads/2015/01/why-are-you-hungry.jpg");
            background-repeat: no-repeat;
            background-size: cover;
            background-position: center;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            text-align: center;
            color: whitesmoke;
        }

        h1 {
            color: orangered;
            font-size: 30px;
            margin-top: 0;
            margin-bottom: 20px;
        }

        fieldset {
            background-color: rgba(0, 0, 0, 0.8);
            border-radius: 25px;
            border: none;
            padding: 40px;
            display: inline-block;
            width: 300px;
        }

        .label-text {
            color: orangered;
            font-size: 22px;
            display: block;
            margin-bottom: 10px;
        }

        input {
            border-radius: 15px;
            height: 35px;
            width: 200px;
            border: 1px solid #ccc;
            padding: 0 10px;
            margin-bottom: 20px;
            outline: none;
        }

        .button {
            border: none;
            background-color: orangered;
            color: white;
            border-radius: 10px;
            padding: 5px 15px;
            width: 120px;
            height: 40px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        .button:hover {
            background-color: white;
            color: orangered;
            transform: scale(1.1);
        }
    </style>
</head>
<body class="bc">
    <div class="container">
        <h1>FILL THE DETAILS</h1>
        <fieldset>
            <form action="main.html">
                <label for="name" class="label-text">Enter your Name</label>
                <input type="text" id="name" name="t1" required>

                <label for="table" class="label-text">Enter Table Number</label>
                <input type="number" id="table" name="n1" required>

                <div>
                    <button type="submit" class="button">Submit</button>
                </div>
            </form>
        </fieldset>
    </div>
</body>
</html>
